<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="mediaqueries.css" />
  </head>
  <body>
    <main>
      <header>
        <nav>
          <div class="logo">
            <img
              class="logo-img"
              src="/images/Bite Express.png"
              alt="Bite Express logo"
            />
            <div class="tagline">
              <p class="text">
                <span class="bite"> Bite</span>
                <span class="express">Express </span>
              </p>
              <!-- <p class="slogan">Delicious. Fast. Always.</p> -->
            </div>
          </div>

          <ul class="links">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#menu" class="nav-link">Menu</a></li>
            <li><a href="#reviews" class="nav-link">Reviews</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
          </ul>

          <i class="fa-solid fa-bars hamburger"></i>
        </nav>
      </header>

      <section id="home">
        <div class="hero">
          <div class="hero-text">
            <h1>
              <span class="highlight">Bold Flavors</span>
            </h1>
            <h2 class="slogan">Ready In Minutes</h2>
            <div class="description">
              <p>
                From <span class="highlight">Craving</span> to
                <span class="highlight">Bite</span> in a Flash.
              </p>
            </div>
            <div class="btn-div">
              <button class="btn order-btn">Order Now</button>
              <button class="btn view-btn">View Menu</button>
            </div>
          </div>
          <div class="hero-food">
            <img src="/images/hero-food.png" alt="food hero image" />
            <div class="circle"></div>
          </div>
        </div>
      </section>
      <section id="menu">
        <h2 class="header-tag highlight">Our Menu</h2>
        <div class="menu-header">
          <h2>Must-Try Dishes for You</h2>
        </div>
        <div class="menu-container"></div>
        <div class="menu-footer">
          <button class="btn view-more-btn">View More</button>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
